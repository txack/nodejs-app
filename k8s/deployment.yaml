apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: nodejs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
      annotations:
        # El operador OTEL inyecta el agente Node.js automáticamente
        # estableciendo NODE_OPTIONS=--require @elastic/opentelemetry-node
        # y las variables OTEL_* necesarias.
        instrumentation.opentelemetry.io/inject-nodejs: otel-system/elastic-instrumentation
    spec:
      containers:
        - name: nodejs-app-container
          image: ghcr.io/txack/nodejs-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            failureThreshold: 12
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 256Mi
            requests:
              cpu: 20m
              memory: 64Mi
              ephemeral-storage: 64Mi
          securityContext:
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1001        # UID numérico — coincide con el USER del Dockerfile
            allowPrivilegeEscalation: false
          env:
            - name: NODE_ENV
              value: "production"
            # El operador EDOT inyectará automáticamente:
            #   OTEL_SERVICE_NAME, OTEL_EXPORTER_OTLP_ENDPOINT,
            #   OTEL_TRACES_SAMPLER, NODE_OPTIONS, etc.
